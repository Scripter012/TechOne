<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechOne — Mantenimiento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f8f6f1;
      --accent: #00e5a0;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Announce bar */
    .announce {
      background: var(--accent);
      color: var(--black);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 9px;
      white-space: nowrap;
      overflow: hidden;
    }
    .announce-inner {
      display: inline-block;
      animation: ticker 16s linear infinite;
    }
    @keyframes ticker {
      0%   { transform: translateX(50vw); }
      100% { transform: translateX(-100%); }
    }

    /* Nav */
    nav {
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 64px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.03em;
      color: var(--white);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }



    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    /* Background grid effect */
    main::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Glow */
    main::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(0,229,160,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .error-code {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(7rem, 20vw, 14rem);
      line-height: 1;
      letter-spacing: -0.06em;
      color: rgba(248,246,241,0.04);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      white-space: nowrap;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .tag::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.8s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(1.5); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      letter-spacing: -0.04em;
      line-height: 1;
    }
    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    p {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(248,246,241,0.45);
      max-width: 400px;
      line-height: 1.7;
    }



    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p {
      font-size: 0.75rem;
      color: rgba(248,246,241,0.25);
    }
    .social-links { display: flex; gap: 1.2rem; }
    .social-links a {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(248,246,241,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .social-links a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      nav { padding: 0 1.2rem; }
      footer { padding: 1rem 1.2rem; flex-direction: column; gap: 0.6rem; text-align: center; }
      .error-code { font-size: 40vw; }
    }
  </style>
</head>
<body>

<div class="announce">
  <span class="announce-inner">
    TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp; TechOne &nbsp;•&nbsp;
  </span>
</div>

<nav>
  <a class="logo" href="#">Tech<span>One</span></a>
</nav>

<main>
  <div class="error-code">404</div>
  <div class="content">
    <div class="tag">Página en mantenimiento</div>
    <h1>Volvemos<br><em>muy pronto.</em></h1>
    <p>Estamos trabajando para traerte una experiencia aún mejor. Regresa pronto.</p>
  </div>
</main>

<footer>
  <p>© 2026 TechOne Mayoreo</p>
  <div class="social-links">
    <a href="https://www.instagram.com/techone.mx/" target="_blank">Instagram</a>
    <a href="https://wa.me/529851137498" target="_blank">WhatsApp</a>
  </div>
</footer>

</body>
</html>
